# =====================================================================
# crc.yaml — Colorectal cancer risk model config (BioMe, WXS Cohorts I + II)
# Single source of truth. The shared scripts read either crc.yaml or breast.yaml.
#
# Column names below are resolved from the real clinical-file headers Rita
# provided (pipe-delimited; identical structure across Regeneron & Sema4).
# RECONCILE: <name> marks the FEW names still unconfirmed (roster columns, some
# categorical value strings) — confirm on Minerva before the real run.
#
# Design (approved plan):
#   - Roster is the SPINE: patient IDs + case(CRC)/control labels + ancestry.
#   - Controls = roster group == control (clean; no family history of cancer).
#   - Propensity-score matching (NOT SMOTE) is the primary design.
#   - Two cohorts (Regeneron WXS, Sema4 WXS): pooled model + cross-cohort validation.
#   - Temporal-leakage window: features only from [index-730d, index-182d].
#   - Carriers = AlphaMissense-calibrated all_carriers.tsv (per cohort).
# =====================================================================

cancer: crc
label: "Colorectal cancer"
random_state: 42

paths:
  # workdir is the PARENT so roster / PC / carrier / EHR paths stay relative
  # (keeps --data-root working for synthetic runs).
  workdir:   /sc/arion/projects/rg_huangk06/variants_PLP_BioMe
  outdir:    Cancer_risk_prediction/CRC          # per-cancer folder (breast -> .../breast)

# ---------------------------------------------------------------------
# Cohorts. Same key structure per cohort so one loader reads either.
# Clinical files are pipe-delimited with a `sem_id` patient key. If Regeneron's
# key column differs, set clinical_id_col per cohort (it overrides the table id).
# ---------------------------------------------------------------------
cohorts:
  - name: cohortI
    platform: regeneron_wxs
    roster:          Cancer_risk_prediction/derived/RegenWXS_HX_Newgroups.withPC.tsv
    ehr_dir:         Cancer_risk_prediction/src/Regen
    clinical_id_col: sem_id          # clinical files key on sem_id (SINAI-format values)
    carrier_flags:   Biome-alphamissense-calibration/results/cohortI/all_carriers.tsv
  - name: cohortII
    platform: sema4_wxs
    roster:          metadata/Sema4WXS_HX_Newgroups.250109.tsv
    ehr_dir:         RECONCILE:src/Sema4      # TBD — confirm the Cohort II clinical dir
    clinical_id_col: sem_id
    carrier_flags:   Biome-alphamissense-calibration/results/cohortII/all_carriers.tsv

cohort_strategy:
  train_cohorts:   [cohortI]     # the model is trained ONLY on these cohorts
  holdout_cohorts: [cohortII]    # external validation / calibration only — never trained on
  cross_cohort:    true          # evaluate.py also runs a quick both-directions LR check

# ---------------------------------------------------------------------
# Roster (the spine). Join keys, labels, ancestry. The roster must ALSO carry
# the sequencing<->EHR crosswalk: carriers use SINAI_* sample ids, while the
# clinical files key on sem_id. ehr_id_col must hold the same ids as sem_id.
# Roster header not yet provided -> these names are RECONCILE.
# ---------------------------------------------------------------------
roster:
  sep: "\t"
  # ehr_id and sample_id are the SAME source id (SINAI). We point ehr_id at
  # SINAI_ID and sample_id at the SAMPLE_ID alias (added by prep_roster_cohortI.py)
  # so read_roster doesn't collapse the two same-named columns. MASKED_MRN is a
  # plain integer used only to join the PC file — NOT a clinical/carrier key.
  ehr_id_col:         SINAI_ID               # == clinical sem_id values
  sample_id_col:      SAMPLE_ID              # alias of SINAI_ID (== carrier sample_id)
  group_col:          Group
  case_labels:        ["Colon/Rectum"]
  control_label:      "Control (age≥50)"     # ≥ is U+2265 — keep verbatim
  drop_other_groups:  true
  ancestry_group_col: genetically_determined
  pc_cols:            [PC1, PC2, PC3, PC4]

# ---------------------------------------------------------------------
# RAW clinical files (headers resolved). `long: true` = one row per
# (patient, item, date) — the value/item live in columns, not one col per item.
# ---------------------------------------------------------------------
ehr_tables:
  demographics:
    file: Demographics.txt
    sep: "|"
    id_col: sem_id
    cols:
      sex:            gender
      race:           self_reported_race
      ethnicity:      ethnic_group_c
      marital_status: marital_status
      religion:       religion
      country:        country
  problem_list:
    file: Problem_List.txt
    sep: "|"
    id_col: sem_id
    cols:
      icd_code:  icd9_code
      code_type: code_type
      text:      description
      date:      noted_date
  enc_diagnosis:
    file: Encounter_Diagnosis.txt
    sep: "|"
    id_col: sem_id
    cols:
      icd_code:  dx_code1
      code_type: dx_code_type
      text:      dx_name
      date:      contact_date       # authoritative dx date -> index_date for cases
  vitals:                            # LONG format
    file: Vitals.txt
    sep: "|"
    id_col: sem_id
    long: true
    cols:
      name:  vital_sign_description
      value: vital_sign_measurement
      date:  date_of_assessment
  labs:                              # LONG format
    file: Order_results.txt
    sep: "|"
    id_col: sem_id
    long: true
    cols:
      analyte: component_name
      value:   ord_num_value
      date:    result_date
      units:   reference_unit
      flag:    result_flag_c
  social:
    file: Social_History.txt
    sep: "|"
    id_col: sem_id
    cols:
      smoking:         TOBACCO_USER
      alcohol:         IS_ALCOHOL_USER
      years_education: YEARS_EDUCATION
      date:            ENTRY_DATE
  family:
    file: Family_History.txt
    sep: "|"
    id_col: sem_id
    cols:
      relation:  relation_c
      condition: problem_description
      date:      entry_date
  medical_hx:
    file: Medical_History.txt
    sep: "|"
    id_col: sem_id
    cols:
      icd_code:  ICD9_CODE
      code_type: CODE_TYPE
      text:      MEDICAL_HX_DESCRIPTION
      date:      MEDICAL_HX_DATE
  surgical_hx:
    file: Surgical_History.txt
    sep: "|"
    id_col: sem_id
    cols:
      procedure: procedure_name
      text:      surgical_hx_description
      date:      surgical_hx_date
  meds:
    file: Medications.txt
    sep: "|"
    id_col: sem_id
    cols:
      name: DESCRIPTION
      date: ordering_date
  health_maintenance:                # HISTORY has the screening done-date per topic
    file: HEALTH_MAINTENANCE_HISTORY.txt
    sep: "|"
    id_col: sem_id
    cols:
      topic: hm_topic_name
      date:  entry_date
      type:  hm_type
    colonoscopy_topics: ["Colorectal Cancer Screening", "Colonoscopy"]
  questionnaire:                      # rich self-report survey (like AoU)
    file: Questionnaire.txt
    sep: "|"
    id_col: sem_id
    cols:
      year_of_birth:       YEAR_OF_BIRTH        # -> age_at_index (no DOB in Demographics)
      country_of_birth:    COUNTRY_OF_BIRTH
      language_preference: LANGUAGE_PREFERENCE
      education_grade:     EDUCATION_HIGHEST_GRADE
      fam_hx_colon_cancer: FAM_HX_COLON_CANCER
      pers_hx_ibd:         PERS_HX_INFLAMMATORY_BOWEL
      pers_hx_diabetes:    PERS_HX_DIABETES
      pers_hx_obesity:     PERS_HX_OBESITY
      pers_hx_htn:         PERS_HX_HIGH_BLOOD_PRESSURE
      smoked_100:          SMOKED_GT_100_CIGARETTES_EVER

# ---------------------------------------------------------------------
# Phenotype — cases from the roster group, cross-checked / dated by ICD.
# ---------------------------------------------------------------------
phenotype:
  case_icd10_prefix: ["C18", "C19", "C20"]     # colon, rectosigmoid, rectum
  case_icd9_prefix:  ["153", "154"]
  age_source: questionnaire_year_of_birth      # age = index_year - YEAR_OF_BIRTH
  index_date:
    case:    earliest_qualifying_dx
    control: last_encounter                     # J4: controls use last encounter date

controls:
  source: roster_group

matching:
  method: propensity
  ps_covariates: [age_at_index, sex, genetic_pcs, cohort]
  k_controls: 4
  caliper_sd: 0.2
  replace: false
  also_emit_unmatched: true

temporal_window:
  min_lead_days: 182
  max_lookback_days: 730
  drop_on_or_after_index: true
  log_dropped_post_index: true

genomics:
  carrier_file:
    sep: "\t"
    sample_id_col: sample_id
    gene_col: gene
    evidence_cols: {acmg: in_ACMG, alphamissense: in_AM, clinvar: in_ClinVar}
    positive_value: "yes"
  carrier_evidence: any_of
  evidence_sources: [clinvar, alphamissense]   # strict alternative: [acmg]
  panel: [MLH1, MSH2, MSH6, PMS2, EPCAM, APC, MUTYH, SMAD4, STK11,
          BMPR1A, PTEN, POLE, POLD1, NTHL1]
  aggregate_flag: lynch_any
  extra_aggregate: crc_panel_any
  aggregate_members:
    lynch_any:     [MLH1, MSH2, MSH6, PMS2, EPCAM]
    crc_panel_any: [MLH1, MSH2, MSH6, PMS2, EPCAM, APC, MUTYH, SMAD4, STK11,
                    BMPR1A, PTEN, POLE, POLD1, NTHL1]

features:
  shared:
    - age_at_index
    - sex
    - race
    - ethnicity
    - genetic_pcs
    - cohort
    - bmi
    - smoking_status
    - alcohol_use
    - family_hx_crc
    - charlson_index
  socioeconomic:
    - years_education
    - marital_status
    - religion
    - language_preference
    - country_of_birth
  crc_specific:
    labs:
      - wbc
      - hemoglobin
      - platelet_count
      - creatinine
      - alt
      - ast
    engineered_flags:
      - obese
      - hypertension
      - high_platelets
      - low_platelets
      - high_creatinine
    symptoms:
      - rectal_bleeding
      - bowel_changes
      - abdominal_pain
    trajectory:
      - bmi_slope
      - weight_loss_velocity
      - hemoglobin_slope
    procedures:
      - prior_colonoscopy
      - prior_polypectomy
    comorbidities:
      - ibd
      - diabetes
    medications:
      - aspirin
      - nsaid
  audit_only:
    - cea                             # J3: pre-index CEA is leakage/indication bias

# ---------------------------------------------------------------------
# Feature maps — how raw values map to feature keys. Column names are known;
# some VALUE strings (lab component_name, vital descriptions) are best-guesses
# to confirm against the data. features.py matches case-insensitively.
# ---------------------------------------------------------------------
feature_maps:
  vital_signs:                        # vital_sign_description -> feature
    bmi:    ["BMI", "Body Mass Index"]
    height: ["Height"]
    weight: ["Weight"]
    sbp:    ["BP Systolic", "Systolic Blood Pressure", "Systolic"]
    dbp:    ["BP Diastolic", "Diastolic Blood Pressure", "Diastolic"]
  lab_analytes:                       # component_name -> feature
    wbc:            ["WBC", "White Blood Cell Count"]
    hemoglobin:     ["Hemoglobin", "HGB"]
    platelet_count: ["Platelet", "Platelet Count", "PLT"]
    creatinine:     ["Creatinine"]
    alt:            ["ALT", "Alanine Aminotransferase"]
    ast:            ["AST", "Aspartate Aminotransferase"]
    cea:            ["CEA", "Carcinoembryonic Antigen"]
  medications:
    aspirin: ["aspirin"]
    nsaid:   ["ibuprofen", "naproxen", "nsaid", "celecoxib", "diclofenac"]
  comorbidity_icd:                    # ICD prefixes (either coding system)
    ibd:             ["K50", "K51", "555", "556"]
    diabetes:        ["E10", "E11", "250"]
    obesity:         ["E66", "278"]
    hypertension_dx: ["I10", "401"]
  symptom_icd:
    rectal_bleeding: ["K625", "5693", "5780", "5781"]
    bowel_changes:   ["R197", "78791"]
    abdominal_pain:  ["R109", "R10", "7890"]
  procedures:
    prior_polypectomy: ["polypectomy"]        # surgical_hx procedure text contains
  family_history:
    questionnaire_flag: fam_hx_colon_cancer    # preferred: survey flag
    positive_values: ["yes", "y", "1", "true"]
    crc_terms: ["colorectal", "colon cancer", "rectal cancer"]   # fallback: family text

thresholds:
  obese_bmi: 30
  hypertension_sbp: 140
  hypertension_dbp: 90
  platelet_high: 400        # 10^3/uL
  platelet_low: 150
  creatinine_high: 1.3      # mg/dL

model:
  candidates: [logistic_l2, random_forest, xgboost]
  primary_population: matched
  imbalance:
    matched: none
    full: class_weight
  cv_folds: 5
  cv: stratified_group
  search: randomized
  search_iters: 20
  threshold_tuning:
    objective: recall
    min_precision: 0.10
  select_metric: pr_auc

evaluation:
  metrics: [auc, pr_auc, calibration, brier]
  stratify_by: ancestry_group
  calibration_bins: 10
  cross_cohort: true
  shap: treeexplainer
  shap_top_k: 15
  carrier_enrichment: true
